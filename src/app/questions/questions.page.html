<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Questions list
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Questions</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <ion-searchbar animated="true" placeholder="Type related keywords to find question" (ionInput)="handleInput($event)"></ion-searchbar>

    <ion-item *ngFor="let question of filteredQuestions" button (click)="clickOnQuestion(question)" detail>
      <ion-label>{{ question.id }}. {{ question.name }}</ion-label>
      <ion-badge
        [color]="(getPercentById(question.id) | async) < 33 && 'danger' ||
                (getPercentById(question.id) | async) < 66 && 'warning' || 'success'"
        slot="end">
          {{ (getPercentById(question.id) | async) }}%
      </ion-badge>
    </ion-item>
  </div>
</ion-content>
